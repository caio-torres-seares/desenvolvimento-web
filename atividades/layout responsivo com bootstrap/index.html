<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trabalho de Layout</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #e2e2e2; 
            margin: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh; 
        }

        .header, footer {
            background-color: #808080; 
            height: 60px;
            width: 100%;
        }

        .box {
            background-color: #808080;
            margin-bottom: 20px;
        }

        .small-box { height: 200px; }
        .larger-box { height: 350px; }
        .list-box { height: 80px; margin-bottom: 15px; } 

        main {
            padding-top: 40px;
            padding-bottom: 40px;
        }
    </style>
</head>
<body>

    <header class="header"></header>

    <main class="d-flex align-items-center justify-content-center flex-grow-1">        
        <div class="container">
            <div class="row g-5 mb-5">
                <div class="col-4">
                    <div class="box small-box"></div>
                </div>
                <div class="col-4">
                    <div class="box small-box"></div>
                </div>
                <div class="col-4">
                    <div class="box small-box"></div>
                </div>
            </div>

            <div class="row mb-5">
                <div class="col-12">
                    <div class="box larger-box"></div>
                </div>
            </div>

            <div class="row g-4 gx-5">
                <div class="col-6">
                    <div class="box list-box"></div>
                </div>
                <div class="col-6">
                    <div class="box list-box"></div>
                </div>
                <div class="col-6">
                    <div class="box list-box"></div>
                </div>
                <div class="col-6">
                    <div class="box list-box"></div>
                </div>
            </div>
        </div>
    </main>

    <footer class="footer"></footer>
</body>
</html>
